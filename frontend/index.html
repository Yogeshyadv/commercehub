<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NextGen B2B E-Commerce & Catalog SaaS — AI-powered vendor dashboard" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>CommerceHub — B2B E-Commerce & Catalog Platform</title>

    <!--
      THEME FLASH PREVENTION
      Runs synchronously before React renders. Reads the saved theme from
      localStorage (key: 'commercehub-theme') and applies the 'dark' class
      to <html> immediately so there is no white flash on page load.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('commercehub-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (prefersDark ? 'dark' : 'light');
          document.documentElement.classList.add(theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
